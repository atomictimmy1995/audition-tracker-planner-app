name: Deploy ai edge function

# The Supabase GitHub integration applies database migrations but does not
# deploy edge functions, so we deploy the `ai` function here on every push to
# main that touches it (and on demand via "Run workflow").
#
# Requires one repository secret: SUPABASE_ACCESS_TOKEN
#   (Supabase Dashboard → Account → Access Tokens → Generate).
# The project ref is public, not a secret.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-ai-function.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: fufhymaxcxubcplzhhom
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy ai function
        run: supabase functions deploy ai --project-ref "$PROJECT_REF"
